<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const playerId = params.get('player') || '592450';
    window.location.replace(`./#/player/${playerId}`);
  </script>
</body>
</html>
